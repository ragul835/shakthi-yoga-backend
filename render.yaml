databases:
  - name: shakthi-yoga-db
    plan: free
    databaseName: shakthi_yoga
    user: shakthi_yoga

services:
  - type: web
    name: shakthi-yoga-backend
    runtime: node
    plan: free
    repo: https://github.com/ragul835/shakthi-yoga-backend
    branch: main
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/classes/public
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shakthi-yoga-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: FRONTEND_URL
        value: https://shakthi-yoga.onrender.com